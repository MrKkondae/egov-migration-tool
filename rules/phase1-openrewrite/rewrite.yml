  - org.openrewrite.text.FindAndReplace:
      find: '(?s)(<dependency>\s*<groupId>egovframework\.rte</groupId>\s*<artifactId>egovframework\.rte\.fdl\.property</artifactId>\s*<version>)(?:\$\{egovframework\.rte\.version\}|4\.3\.0)(</version>)'
      replace: '$1\${org.egovframe.rte.version}$2'
