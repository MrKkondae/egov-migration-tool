type: specs.openrewrite.org/v1beta/recipe
name: egov.migration.phase1.FullMigration
displayName: eGovFrame 3.1 to 4.3 - Phase 1 Full Migration
description: >
  Entry-point recipe for phase 1 migration. This file is self-contained so
  rewrite-maven-plugin can load one config file and still resolve all
  composite and leaf recipes required for pom.xml, Java, and XML changes.

recipeList:
  - egov.migration.phase1.PomDependencyMigration
  - egov.migration.phase1.JavaMigration
  - egov.migration.phase1.XmlMigration

---
type: specs.openrewrite.org/v1beta/recipe
name: egov.migration.phase1.PomDependencyMigration
displayName: eGovFrame 3.1 to 4.3 - Pom Dependency Migration
description: >
  Composite Maven dependency migration recipe for eGovFrame 3.1 to 4.3.

recipeList:
  - egov.migration.phase1.pom.EgovframeCoordinates
  - egov.migration.phase1.pom.SpringUpgrades
  - egov.migration.phase1.pom.LoggingUpgrades
  - egov.migration.phase1.pom.JacksonJdbcJstl
  - egov.migration.phase1.pom.SafeCommonVersionUpgrades

---
type: specs.openrewrite.org/v1beta/recipe
name: egov.migration.phase1.JavaMigration
displayName: eGovFrame 3.1 to 4.3 - Java Migration
description: >
  Composite Java source migration recipe for eGovFrame 3.1 to 4.3.

recipeList:
  - egov.migration.phase1.java.EgovPackageRenames
  - egov.migration.phase1.java.JacksonTypeMigration

---
type: specs.openrewrite.org/v1beta/recipe
name: egov.migration.phase1.XmlMigration
displayName: eGovFrame 3.1 to 4.3 - XML Migration
description: >
  Composite XML migration recipe for eGovFrame 3.1 to 4.3.

recipeList:
  - egov.migration.phase1.xml.EgovXmlPackageRenames
  - egov.migration.phase1.xml.JacksonXmlMigration

---
type: specs.openrewrite.org/v1beta/recipe
name: egov.migration.phase1.pom.EgovframeCoordinates
displayName: eGovFrame 3.1 to 4.3 - eGovFrame Coordinates
description: >
  High-confidence 1:1 Maven coordinate migration for eGovFrame RTE
  dependencies from eGovFrame 3.1 to 4.3.

recipeList:
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.fdl.cmmn
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.fdl.cmmn
      newVersion: "4.3.0"
      changeManagedDependency: true

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.fdl.idgnr
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.fdl.idgnr
      newVersion: "4.3.0"
      changeManagedDependency: true

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.fdl.logging
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.fdl.logging
      newVersion: "4.3.0"
      changeManagedDependency: true

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.fdl.property
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.fdl.property
      newVersion: "4.3.0"
      changeManagedDependency: true

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.psl.dataaccess
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.psl.dataaccess
      newVersion: "4.3.0"
      changeManagedDependency: true

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.ptl.mvc
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.ptl.mvc
      newVersion: "4.3.0"
      changeManagedDependency: true

---
