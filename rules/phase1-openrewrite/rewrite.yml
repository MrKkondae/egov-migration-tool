type: specs.openrewrite.org/v1beta/recipe
name: egov.migration.phase1.pom.EgovframeCoordinates
displayName: eGovFrame 3.1 to 4.3 - eGovFrame Coordinates
description: >
  Composite recipe that runs eGovFrame RTE migration in two steps. First add
  a dedicated 4.3 property without touching the legacy 3.1 property. Then
  rename only the stable modules and switch their version references to the
  new 4.3 property.

recipeList:
  - egov.migration.phase1.pom.EgovframeCoordinatesPrepare43Property
  - egov.migration.phase1.pom.EgovframeCoordinatesSwitchStableModules

---
type: specs.openrewrite.org/v1beta/recipe
name: egov.migration.phase1.pom.EgovframeCoordinatesPrepare43Property
displayName: eGovFrame 3.1 to 4.3 - Prepare 4.3 Property
description: >
  Step 1 for eGovFrame RTE migration. Keep the legacy 3.1 property as-is and
  create or update a separate property for the validated 4.3 modules.

recipeList:
  - org.openrewrite.maven.ChangePropertyValue:
      key: org.egovframe.rte.version
      newValue: 4.3.0
      addIfMissing: true
      trustParent: false

---
type: specs.openrewrite.org/v1beta/recipe
name: egov.migration.phase1.pom.EgovframeCoordinatesSwitchStableModules
displayName: eGovFrame 3.1 to 4.3 - Switch Stable Modules To 4.3 Property
description: >
  Step 2 for eGovFrame RTE migration. Rename validated modules from legacy
  egovframework coordinates to org.egovframe coordinates and switch only
  those modules to the dedicated 4.3 property reference.

recipeList:
  - org.openrewrite.text.FindAndReplace:
      find: '(?s)(<dependency>\s*<groupId>egovframework\.rte</groupId>\s*<artifactId>egovframework\.rte\.fdl\.cmmn</artifactId>\s*<version>)(?:\$\{egovframework\.rte\.version\}|4\.3\.0)(</version>)'
      replace: '$1\${org.egovframe.rte.version}$2'
      regex: true
      caseSensitive: true
      multiline: true
      dotAll: true
      filePattern: '**/pom.xml'
      plaintextOnly: false

  - org.openrewrite.text.FindAndReplace:
      find: '(?s)(<dependency>\s*<groupId>egovframework\.rte</groupId>\s*<artifactId>egovframework\.rte\.fdl\.idgnr</artifactId>\s*<version>)(?:\$\{egovframework\.rte\.version\}|4\.3\.0)(</version>)'
      replace: '$1\${org.egovframe.rte.version}$2'
      regex: true
      caseSensitive: true
      multiline: true
