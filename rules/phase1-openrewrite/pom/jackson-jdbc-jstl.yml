type: specs.openrewrite.org/v1beta/recipe
name: egov.migration.phase1.pom.JacksonJdbcJstl
displayName: eGovFrame 3.1 to 4.3 - Jackson, MyBatis, JDBC, JSTL
description: >
  Immediate pom.xml-safe dependency changes that do not require unconditional
  dependency additions. This recipe includes Jackson 1.x to 2.x coordinate
  migration, MyBatis version alignment, Oracle JDBC coordinate cleanup, and
  JSTL implementation replacement.

recipeList:
  ###########################################################################
  # Jackson 1.x -> Jackson 2.x
  ###########################################################################

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.codehaus.jackson
      oldArtifactId: jackson-core-asl
      newGroupId: com.fasterxml.jackson.core
      newArtifactId: jackson-core
      newVersion: "2.15.4"
      changeManagedDependency: true

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.codehaus.jackson
      oldArtifactId: jackson-mapper-asl
      newGroupId: com.fasterxml.jackson.core
      newArtifactId: jackson-databind
      newVersion: "2.15.4"
      changeManagedDependency: true

  ###########################################################################
  # MyBatis / MyBatis-Spring version upgrades
  # Keep here so immediate non-Spring pom upgrades stay in one focused recipe.
  ###########################################################################

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.mybatis
      artifactId: mybatis
      newVersion: "3.5.16"
      overrideManagedVersion: false

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.mybatis
      artifactId: mybatis-spring
      newVersion: "2.1.2"
      overrideManagedVersion: false

  ###########################################################################
  # Oracle JDBC
  # jdbc-14.jar style local or systemPath declarations must be reviewed
  # manually because they usually do not have stable Maven coordinates.
  ###########################################################################

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: com.oracle
      oldArtifactId: ojdbc14
      newGroupId: com.oracle.database.jdbc
      newArtifactId: ojdbc8
      newVersion: "19.22.0.0"
      changeManagedDependency: true

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: com.oracle.database.jdbc
      oldArtifactId: ojdbc14
      newGroupId: com.oracle.database.jdbc
      newArtifactId: ojdbc8
      newVersion: "19.22.0.0"
      changeManagedDependency: true

  ###########################################################################
  # JSTL / standard.jar
  # Replace only existing declarations. Do not add new JSTL dependencies
  # unconditionally in multi-module builds.
  ###########################################################################

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: taglibs
      oldArtifactId: standard
      newGroupId: org.apache.taglibs
      newArtifactId: taglibs-standard-impl
      newVersion: "1.2.5"
      changeManagedDependency: true

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: javax.servlet
      artifactId: jstl
      newVersion: "1.2"
      overrideManagedVersion: false
