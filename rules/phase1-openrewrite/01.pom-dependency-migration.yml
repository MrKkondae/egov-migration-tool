type: specs.openrewrite.org/v1beta/recipe
name: egov.migration.phase1.PomDependencyMigration
displayName: eGovFrame 3.1 to 4.3 - Pom Dependency Migration
description: >
  Draft recipe for migrating Maven dependencies from eGovFrame 3.1 based projects
  to eGovFrame 4.3 compatible dependency coordinates and versions.

  NOTE:
  - This recipe is a draft based on Library Migration Matrix.
  - OpenRewrite Maven Plugin version: 6.11
  - AS-IS pom.xml was not available when this draft was created.
  - Validate oldGroupId/oldArtifactId/version against the actual project pom.xml before execution.
  - Run mvn rewrite:dryRun and mvn test after applying this recipe.
  - Java source import changes and XML configuration changes are handled by separate recipes.

recipeList:
  ###########################################################################
  # 1. eGovFrame RTE 3.1.0 -> eGovFrame 4.3.0
  ###########################################################################

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.fdl.cmmn
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.fdl.cmmn
      newVersion: 4.3.0

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.fdl.idgnr
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.fdl.idgnr
      newVersion: 4.3.0

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.fdl.logging
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.fdl.logging
      newVersion: 4.3.0

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.fdl.property
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.fdl.property
      newVersion: 4.3.0

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.psl.dataaccess
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.psl.dataaccess
      newVersion: 4.3.0

  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: egovframework.rte
      oldArtifactId: egovframework.rte.ptl.mvc
      newGroupId: org.egovframe.rte
      newArtifactId: org.egovframe.rte.ptl.mvc
      newVersion: 4.3.0

  ###########################################################################
  # 2. Spring Framework 3.2.9.RELEASE -> 5.3.37
  ###########################################################################

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-aop
      newVersion: 5.3.37

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-beans
      newVersion: 5.3.37

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-context
      newVersion: 5.3.37

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-context-support
      newVersion: 5.3.37

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-core
      newVersion: 5.3.37

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-expression
      newVersion: 5.3.37

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-jdbc
      newVersion: 5.3.37

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-orm
      newVersion: 5.3.37

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-tx
      newVersion: 5.3.37

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-web
      newVersion: 5.3.37

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.springframework
      artifactId: spring-webmvc
      newVersion: 5.3.37

  ###########################################################################
  # 3. MyBatis / MyBatis-Spring
  ###########################################################################

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.mybatis
      artifactId: mybatis
      newVersion: 3.5.16

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.mybatis
      artifactId: mybatis-spring
      newVersion: 2.1.2

  ###########################################################################
  # 4. Jackson 1.x -> Jackson 2.x
  ###########################################################################

  - org.openrewrite.maven.RemoveDependency:
      groupId: org.codehaus.jackson
      artifactId: jackson-core-asl

  - org.openrewrite.maven.RemoveDependency:
      groupId: org.codehaus.jackson
      artifactId: jackson-mapper-asl

  - org.openrewrite.maven.AddDependency:
      groupId: com.fasterxml.jackson.core
      artifactId: jackson-core
      version: 2.15.4

  - org.openrewrite.maven.AddDependency:
      groupId: com.fasterxml.jackson.core
      artifactId: jackson-databind
      version: 2.15.4

  - org.openrewrite.maven.AddDependency:
      groupId: com.fasterxml.jackson.core
      artifactId: jackson-annotations
      version: 2.15.4

  ###########################################################################
  # 5. Logging - SLF4J / Log4j2
  ###########################################################################

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.slf4j
      artifactId: slf4j-api
      newVersion: 1.7.36

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.slf4j
      artifactId: jcl-over-slf4j
      newVersion: 1.7.36

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.slf4j
      artifactId: log4j-over-slf4j
      newVersion: 1.7.36

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.apache.logging.log4j
      artifactId: log4j-api
      newVersion: 2.17.1

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.apache.logging.log4j
      artifactId: log4j-core
      newVersion: 2.17.1

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.apache.logging.log4j
      artifactId: log4j-slf4j-impl
      newVersion: 2.17.1

  # commons-logging removal must be verified with jcl-over-slf4j.
  # Keep this rule disabled until project logging policy is finalized.
  #
  # - org.openrewrite.maven.RemoveDependency:
  #     groupId: commons-logging
  #     artifactId: commons-logging

  ###########################################################################
  # 6. Oracle JDBC
  ###########################################################################

  - org.openrewrite.maven.RemoveDependency:
      groupId: com.oracle
      artifactId: ojdbc14

  - org.openrewrite.maven.RemoveDependency:
      groupId: com.oracle.database.jdbc
      artifactId: ojdbc14

  - org.openrewrite.maven.AddDependency:
      groupId: com.oracle.database.jdbc
      artifactId: ojdbc8
      version: 19.22.0.0

  ###########################################################################
  # 7. JSTL / standard.jar
  ###########################################################################

  - org.openrewrite.maven.RemoveDependency:
      groupId: taglibs
      artifactId: standard

  - org.openrewrite.maven.RemoveDependency:
      groupId: javax.servlet
      artifactId: jstl

  - org.openrewrite.maven.AddDependency:
      groupId: javax.servlet
      artifactId: jstl
      version: 1.2

  - org.openrewrite.maven.AddDependency:
      groupId: org.apache.taglibs
      artifactId: taglibs-standard-impl
      version: 1.2.5

  ###########################################################################
  # 8. Common utility dependency version upgrades
  #    These are conservative version upgrades only.
  ###########################################################################

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: commons-io
      artifactId: commons-io
      newVersion: 2.15.1

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.apache.commons
      artifactId: commons-lang3
      newVersion: 3.12.0

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: commons-net
      artifactId: commons-net
      newVersion: 3.9.0

  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: commons-beanutils
      artifactId: commons-beanutils
      newVersion: 1.9.4

  ###########################################################################
  # 9. Explicitly excluded from this recipe
  #
  # - iBatis -> MyBatis structural migration
  # - Commons DBCP -> DBCP2 / HikariCP
  # - Commons Pool -> HikariCP
  # - Quartz 1.x -> 2.x
  # - iText -> OpenPDF
  # - PDFBox 1.x -> 2.x
  # - Spring Modules Validation -> Bean Validation
  # - Vendor / solution libraries
  ###########################################################################

